title: 谷歌加速器
email: support@googlejiasuqi.com
description: >-
  谷歌加速器 - 一款帮助您畅快访问 Google 服务的专业网络加速工具。高速稳定、智能路由、多平台支持，让您随时随地无障碍访问谷歌搜索、Gmail、Google Scholar 等服务。
baseurl: ""
url: "https://googlejiasuqi.github.io"
github_username: googlejiasuqi

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/

# Site language
lang: zh-CN

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Default frontmatter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
