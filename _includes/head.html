<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }} - 畅快访问 Google 服务{% endif %}</title>

<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="keywords" content="谷歌加速器, Google加速器, 网络加速, VPN, 代理, 谷歌访问, Google访问, 科学上网">
<meta name="author" content="谷歌加速器">
<meta name="robots" content="index, follow">

<link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">

<!-- Open Graph -->
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url | replace:'index.html','' }}">
<meta property="og:locale" content="zh_CN">
{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{% if page.layout == 'post' %}Article{% else %}WebSite{% endif %}",
  "name": "谷歌加速器",
  "url": "{{ site.url }}{{ page.url | replace:'index.html','' }}",
  "description": "{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}",
  "inLanguage": "zh-CN",
  "publisher": {
    "@type": "Organization",
    "name": "谷歌加速器",
    "url": "{{ site.url }}"
  }
  {% if page.date %}
  ,"datePublished": "{{ page.date | date_to_xmlschema }}"
  {% endif %}
}
</script>

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
<link rel="sitemap" type="application/xml" title="Sitemap" href="{{ site.baseurl }}/sitemap.xml">
